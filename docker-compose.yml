services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: crm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: crm_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./docs/database/email_settings_migration.sql:/docker-entrypoint-initdb.d/02-email-settings.sql
      - ./docs/database/enhanced_customer_schema.sql:/docker-entrypoint-initdb.d/03-enhanced-customer.sql
      - ./docs/database/permission_and_highsea_migration.sql:/docker-entrypoint-initdb.d/04-permission-highsea.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # Redis缓存
  redis:
    image: redis:7.0
    container_name: crm-redis
    command: redis-server --requirepass redis123456
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - crm-network

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: crm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123456
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - crm-network

  # Elasticsearch搜索引擎
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: crm-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - crm-network

  # MinIO对象存储
  minio:
    image: minio/minio
    container_name: crm-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - crm-network

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: crm-admin/Dockerfile
    container_name: crm-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      DB_PASSWORD: root123456
      REDIS_PASSWORD: redis123456
      RABBITMQ_PASSWORD: admin123456
      JWT_SECRET: foreign-trade-crm-secret-key-change-in-production-2026
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - crm-network

  # 前端服务
  frontend:
    build:
      context: ./crm-frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data:
  minio-data:
