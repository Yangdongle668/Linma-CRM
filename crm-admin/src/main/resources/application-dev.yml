# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/crm_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123456

# MyBatis Plus - 开发环境开启SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j - 开发环境开启
knife4j:
  enable: true

# 日志级别
logging:
  level:
    com.crm: DEBUG
