# 生产环境配置
spring:
  datasource:
    # Docker环境使用服务名
    url: jdbc:mysql://mysql:3306/crm_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:redis123456}

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: ${RABBITMQ_PASSWORD:admin123456}

# MyBatis Plus - 生产环境关闭SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# Knife4j - 生产环境可选择性关闭
knife4j:
  enable: true
  production: false

# JWT密钥 - 生产环境建议通过环境变量设置
jwt:
  secret: ${JWT_SECRET:linma-crm-jwt-secret-key-change-in-production-2026}

# 日志级别
logging:
  level:
    root: WARN
    com.crm: INFO
  file:
    path: /app/logs
